name: Daily Gita Shloka

on:
  schedule:
    - cron: '0 0 * * *'    # every day midnight UTC
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  update-shloka:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Update shloka
        run: python .github/scripts/update_shloka.py

      - name: Commit
        run: |
          git config user.name  "the-lust"
          git config user.email "actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "🪷 gita $(date +'%Y-%m-%d')"
          git push
